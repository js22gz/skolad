<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skolad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .display {
            font-family: 'Playfair Display', serif;
        }
        
        .hero-text {
            font-size: clamp(4rem, 12vw, 9rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-[#f8f1e3] overflow-x-hidden">

    <!-- HERO / HEADER -->
    <header class="max-w-screen-2xl mx-auto min-h-screen flex items-center px-8">
        <div class="w-full max-w-5xl mx-auto text-center">
            
            <div class="inline-flex items-center gap-x-3 bg-white/5 text-white/60 text-sm uppercase tracking-[1px] px-6 py-2 rounded-3xl border border-white/10 mb-12">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
                </span>
                SWEDISH • 2026
            </div>
            
            <h1 class="display hero-text mb-6">
                SKOLAD
            </h1>
            
            <p class="text-3xl md:text-4xl max-w-2xl mx-auto leading-none font-light tracking-[-0.02em] text-white/80">
                educated.<br>
                trained.<br>
                refined.
            </p>
            
            <div class="mt-16 flex flex-col md:flex-row items-center justify-center gap-6 text-sm">
                <div class="flex items-center gap-x-4">
                    <div class="text-white/40">pronunciation</div>
                    <div class="font-mono text-xl tracking-widest">/ˈskuːlad/</div>
                </div>
                <div class="h-3 w-px bg-white/20 hidden md:block"></div>
                <p class="max-w-xs text-white/60 text-lg leading-tight">
                    past participle of <span class="font-medium text-white">skola</span> — to school, to train, to polish
                </p>
            </div>
            
            <!-- subtle swedish nod -->
            <div class="absolute bottom-12 right-12 text-[10px] font-mono text-white/20 rotate-90 origin-bottom-right tracking-widest hidden lg:block">
                KALMAR • SVERIGE
            </div>
        </div>
    </header>

</body>
</html>
